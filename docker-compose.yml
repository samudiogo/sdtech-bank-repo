services:
  pixmanager_api:
    container_name: sdtech-bank-pixmanager-api
    restart: unless-stopped
    build:
      context: .
      dockerfile: Dockerfile
      target: api
    ports:
      - "${ASPNETCORE_HTTP_PORTS}:${ASPNETCORE_HTTP_PORTS}"
      - "${ASPNETCORE_HTTPS_PORTS}:${ASPNETCORE_HTTPS_PORTS}"
    volumes:
      - ${HOME}/.aspnet/https:/https:ro  
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT}      
      ASPNETCORE_URLS: "https://+:${ASPNETCORE_HTTPS_PORTS};http://+:${ASPNETCORE_HTTP_PORTS}"
      ASPNETCORE_Kestrel__Certificates__Default__Password: ${ASPNETCORE_Kestrel__Certificates__Default__Password}
      ASPNETCORE_Kestrel__Certificates__Default__Path: ${ASPNETCORE_Kestrel__Certificates__Default__Path}      
      MongoDB__ConnectionString: mongodb://${MONGO_USER}:${MONGO_PASSWORD}@${MONGO_HOST}:${MONGO_PORT}/?authSource=admin
      MongoDB__DatabaseName: ${MONGO_DB_NAME}
      REDIS__ConnectionString: ${REDIS_ConnectionString}
    networks:
      - pixmanager_network
      - infra_net
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:${ASPNETCORE_HTTP_PORTS}/ready || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
      
  pixmanager_worker:
    container_name: sdtech-bank-pixmanager-worker
    restart: unless-stopped
    build:
      context: .
      dockerfile: Dockerfile
      target: worker
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      MongoDB__ConnectionString: mongodb://${MONGO_USER}:${MONGO_PASSWORD}@${MONGO_HOST}:${MONGO_PORT}/?authSource=admin
      MongoDB__DatabaseName: ${MONGO_DB_NAME}
      RabbitMQ__Username: ${RABBITMQ_USER}
      RabbitMQ__Password: ${RABBITMQ_PASS}
      RabbitMQ__Port: ${RABBITMQ_PORT}
      RabbitMQ__Host: ${RABBITMQ_HOST}
      RabbitMQ__Queue: ${RABBITMQ_QUEUE}
      RabbitMQ__Exchange: ${RABBITMQ_EXCHANGE}
      RabbitMQ__DlqExchange: ${RABBITMQ_DLQEXCHANGE}
      RabbitMQ__DlqQueue: ${RABBITMQ_DLQQUEUE}
      RabbitMQ__QueueType: ${RABBITMQ_QUEUE_TYPE}
      RabbitMQ__MessageTTL: ${RABBITMQ_MESSAGE_TTL_MS}
      RabbitMQ__VirtualHost: ${RABBITMQ_VIRTUAL_HOST}
      REDIS__ConnectionString: ${REDIS_ConnectionString}
      OutboxPublisher__MessagesLimit: ${OUTBOX_PUBLISHER_MessagesLimit}
      OutboxPublisher__IntervalSeconds: ${OUTBOX_PUBLISHER_IntervalSeconds}
      OutboxPublisher__MaxAttempts: ${OUTBOX_PUBLISHER_MaxAttempts}
    networks:
      - pixmanager_network
      - infra_net
    healthcheck:
      test: ["CMD", "pgrep", "dotnet"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s    
  dict_service:
    container_name: sdtech-bank-dict-service
    restart: unless-stopped
    build:
      context: .
      dockerfile: Dockerfile
      target: dict_service
    ports:
    - "8000:8000"
    environment:
      MONGO_URL: mongodb://${MONGO_USER}:${MONGO_PASSWORD}@${MONGO_HOST}:${MONGO_PORT}/?authSource=admin
    networks:
      - pixmanager_network
      - infra_net
    healthcheck:
      test: 
        [
        "CMD",
        "python",
        "-c",
        "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"
      ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
      
networks:
  infra_net:
    external: true
  pixmanager_network:
    driver: bridge
sonar.projectKey=samudiogo_sdtech-bank-repo
sonar.organization=samudiogo

# Nome exibido no painel
sonar.projectName=SdtechBank

# Encoding
sonar.sourceEncoding=UTF-8

# Fontes — raiz do monorepo
sonar.sources=.

# Exclusões de análise (build artifacts, node, etc.)
sonar.exclusions=\
  **/node_modules/**,\
  **/bin/**,\
  **/obj/**,\
  **/TestResults/**,\
  **/*.Designer.cs,\
  **/Migrations/**

# Testes — aponta para os projetos de teste
sonar.tests=\
  libs/sdtechbank/SdtechBank.Application.Tests,\
  libs/sdtechbank/SdtechBank.Domain.Tests

sonar.test.inclusions=**/*Tests.cs,**/*Spec.cs

# Coverage — o scanner vai ler o arquivo gerado pelo dotnet test
sonar.cs.opencover.reportsPaths=**/TestResults/**/coverage.opencover.xml

# Exclusões do CPD (copy-paste detection) — geralmente DTOs e mapeamentos
sonar.cpd.exclusions=\
  **/*MappingExtensions.cs,\
  **/*Request.cs,\
  **/*Response.cs,\
  **/DTOs/**